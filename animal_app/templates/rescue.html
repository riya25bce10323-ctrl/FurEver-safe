<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animal Rescue | FurEver Safe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="page">

        <h1 class="title">Animal Rescue Form 🐶</h1>
        <p class="subtitle">
            Help an animal in need by reporting the details below.
        </p>

        <div class="card">

            <form action="/submit" method="POST">

                <div class="form-group">
                    <label>Animal Type</label>
                    <input type="text" name="animal" placeholder="Dog, Cat, Cow..." required>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" placeholder="Near college gate, street name..." required>
                </div>

                <button type="submit" class="btn primary">
                    🚨 Send Rescue Request
                </button>

            </form>

        </div>

        <br>
        <a href="/">🏠 Back to Home</a>

    </div>

</body>
</html>
